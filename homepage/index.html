<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>运营中台</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --text-primary: rgba(255,255,255,0.9);
      --text-secondary: rgba(255,255,255,0.55);
      --text-tertiary: rgba(255,255,255,0.35);
      --bg: #0F0A1E;
      --white: rgba(255,255,255,0.07);
      --purple: #a29bfe;
      --blue: #74B9FF;
      --indigo: #A29BFE;
      --radius: 20px;
    }

    html, body {
      height: 100%;
      font-family: -apple-system, 'SF Pro Display', 'PingFang SC', 'Helvetica Neue', sans-serif;
      background: var(--bg);
      color: rgba(255,255,255,0.85);
      -webkit-font-smoothing: antialiased;
    }

    /* ===== 顶部导航 ===== */


    /* ===== 主容器 ===== */
    .page {
      min-height: 100vh;
      padding: 0;
    }

    /* ===== Hero 区域 ===== */
    .hero {
      text-align: center;
      padding: 72px 24px 56px;
    }
    .hero-eyebrow {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--purple);
      margin-bottom: 16px;
    }
    .hero-sub {
      font-size: 0.58em;
      font-weight: 500;
      letter-spacing: 0em;
      display: block;
      margin-top: 14px;
      background: linear-gradient(135deg, #a855f7 0%, #ec4899 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      opacity: 0.9;
    }
    .hero h1 {
      font-size: clamp(52px, 7.5vw, 92px);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.08;
      background: linear-gradient(135deg, #6e3ff3 0%, #a855f7 50%, #ec4899 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 18px;
    }
    .hero p {
      font-size: clamp(17px, 2vw, 21px);
      font-weight: 400;
      color: var(--text-secondary);
      line-height: 1.5;
      max-width: 560px;
      margin: 0 auto;
    }

    /* ===== 三列卡片 ===== */
    .cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      background: transparent;
      border-top: none;
      padding: 0 24px 24px;
    }

    .card {
      position: relative;
      background: rgba(255,255,255,0.05);
      overflow: hidden;
      cursor: pointer;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      min-height: 520px;
      transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
      border-radius: 18px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.09);
      border: 1.5px solid rgba(124,58,237,0.07);
    }
    .card:hover { background: rgba(255,255,255,0.1); transform: translateY(-4px); box-shadow: 0 12px 40px rgba(99,102,241,0.3); }
    .card:hover .card-img { transform: scale(1.03); }
    .card:hover .card-cta { color: var(--purple); }
    .card:hover .card-cta-arrow { transform: translateX(4px); }

    /* 卡片图片区 */
    .card-visual {
      overflow: hidden;
      position: relative;
      height: 280px;
      flex-shrink: 0;
    }
    .card-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.5s cubic-bezier(.25,.46,.45,.94);
    }

    /* 渐变遮罩 */
    .card-visual::after {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    .card-1 .card-visual::after {
      background: linear-gradient(160deg, rgba(110,63,243,0.18) 0%, rgba(236,72,153,0.12) 100%);
    }
    .card-2 .card-visual::after {
      background: linear-gradient(160deg, rgba(37,99,235,0.18) 0%, rgba(110,63,243,0.12) 100%);
    }
    .card-3 .card-visual::after {
      background: linear-gradient(160deg, rgba(67,56,202,0.18) 0%, rgba(110,63,243,0.12) 100%);
    }

    /* 卡片文字区 */
    .card-body {
      padding: 32px 36px 36px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .card-label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .card-1 .card-label { color: #d4b3ff; }
    .card-2 .card-label { color: #93c5fd; }
    .card-3 .card-label { color: #a5b4fc; }

    .card-title {
      font-size: clamp(22px, 2.2vw, 28px);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.2;
      color: var(--text-primary);
    }

    .card-desc {
      font-size: 15px;
      color: var(--text-secondary);
      line-height: 1.55;
      margin-top: 4px;
    }

    .card-stats {
      display: flex;
      gap: 24px;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid rgba(0,0,0,0.06);
    }
    .stat-item { display: flex; flex-direction: column; gap: 2px; }
    .stat-val {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text-primary);
    }
    .stat-label {
      font-size: 11px;
      color: var(--text-tertiary);
      font-weight: 500;
    }

    .card-cta {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 20px;
      padding: 10px 20px;
      border-radius: 24px;
      font-size: 15px;
      font-weight: 600;
      color: white;
      transition: all 0.2s;
      align-self: flex-start;
    }
    .card-1 .card-cta { background: linear-gradient(135deg, #7c3aed, #ec4899); }
    .card-2 .card-cta { background: linear-gradient(135deg, #2563eb, #7c3aed); }
    .card-3 .card-cta { background: linear-gradient(135deg, #4338ca, #7c3aed); }
    .card:hover .card-cta { transform: translateX(2px); filter: brightness(1.1); }
    .card-cta-arrow {
      display: inline-block;
      transition: transform 0.25s ease;
      font-size: 16px;
    }

    /* 卡片顶部色条 */
    .card-stripe {
      height: 4px;
      width: 100%;
    }
    .card-1 .card-stripe { background: linear-gradient(90deg, #7c3aed, #ec4899); }
    .card-2 .card-stripe { background: linear-gradient(90deg, #2563eb, #7c3aed); }
    .card-3 .card-stripe { background: linear-gradient(90deg, #4338ca, #7c3aed); }

    /* ===== 底部 ===== */
    footer {
      text-align: center;
      padding: 16px 24px;
      background: rgba(255,255,255,0.03);
      border-top: 1px solid rgba(255,255,255,0.06);
      margin-top: 24px;
    }
    .footer-divider {
      width: 60px; height: 2px;
      background: linear-gradient(90deg, #6e3ff3, #a855f7);
      margin: 0 auto 16px;
      border-radius: 2px;
    }
    .footer-placeholder {
      font-size: 20px; color: rgba(255,255,255,0.15);
      letter-spacing: 8px;
    }
    footer a {
      color: var(--purple);
      text-decoration: none;
    }
    footer a:hover { text-decoration: underline; }

    /* ===== 响应式 ===== */
    @media (max-width: 860px) {
      .cards {
        grid-template-columns: 1fr;
        gap: 16px;
        padding: 0 16px 20px;
      }
      .card { min-height: auto; border-radius: 16px; }
      .card-visual { min-height: 200px; }
      .card-body { padding: 20px 20px 24px; }
      .hero { padding: 40px 20px 28px; }
    }
  </style>
</head>
<body>

<!-- 主页面 -->
<div class="page">

  <!-- Hero -->
  <section class="hero">
    <h1>海外游戏增长中台<br/><span class="hero-sub">选择你的工作台</span></h1>
  </section>

  <!-- 三列卡片 -->
  <div class="cards">

    <!-- 卡片1：游戏平台运营策略 -->
    <a class="card card-1" href="/platform/">
      <div class="card-stripe"></div>
      <div class="card-visual">
        <img class="card-img" id="img1" src="" alt="游戏平台运营策略" />
      </div>
      <div class="card-body">
        <span class="card-label">策略中心</span>
        <h2 class="card-title">游戏平台<br/>运营策略</h2>
        <span class="card-cta">进入策略中心 <span class="card-cta-arrow">→</span></span>
      </div>
    </a>

    <!-- 卡片2：创作者管理系统 -->
    <a class="card card-2" href="/kol/">
      <div class="card-stripe"></div>
      <div class="card-visual">
        <img class="card-img" id="img2" src="" alt="创作者管理系统" />
      </div>
      <div class="card-body">
        <span class="card-label">KOL 管理</span>
        <h2 class="card-title">创作者<br/>管理系统</h2>
        <span class="card-cta">进入创作者系统 <span class="card-cta-arrow">→</span></span>
      </div>
    </a>

    <!-- 卡片3：社交平台运营策略 -->
    <a class="card card-3" href="/Community/">
      <div class="card-stripe"></div>
      <div class="card-visual">
        <img class="card-img" id="img3" src="" alt="社交平台运营策略" />
      </div>
      <div class="card-body">
        <span class="card-label">策略中心</span>
        <h2 class="card-title">社交平台<br/>运营策略</h2>
        <span class="card-cta">进入策略中心 <span class="card-cta-arrow">→</span></span>
      </div>
    </a>

  </div>

  <!-- 底部个人账号介绍 -->
  <footer>
    <p style="margin:0;font-size:12px;color:rgba(255,255,255,0.3);line-height:1.6;letter-spacing:0.3px;">Contact me &nbsp;|&nbsp; Wecom：YourName&nbsp;&nbsp;微信：YOUR_WECHAT_ID&nbsp;&nbsp;微信公众号：YOUR_PUBLIC_ACCOUNT&nbsp;&nbsp;Linkedin：Lynn Zhao</p>
  </footer>

</div>

<script type="module">
  // 图片资源（使用可靠的占位图，带渐变色调）
  const images = {
    img1: 'https://images.unsplash.com/photo-1493711662062-fa541adb3fc8?w=800&q=80',  // 游戏平台手柄
    img2: 'https://images.unsplash.com/photo-1598550476439-6847785fcea6?w=800&q=80',  // KOL 游戏主播戴耳机
    img3: 'https://images.unsplash.com/photo-1611162617213-7d7a39e9b1d7?w=800&q=80', // 社交媒体
  };

  Object.entries(images).forEach(([id, src]) => {
    const el = document.getElementById(id);
    if (el) el.src = src;
  });
</script>

</body>
</html>
